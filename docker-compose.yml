services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cs-agent-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: company_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d company_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: cs-agent-rag-api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://agent:agent@postgres:5432/company_agent}
      PORT: ${RAG_API_PORT:-8081}
    command: uvicorn company_agent.rag_api.main:app --host 0.0.0.0 --port ${RAG_API_PORT:-8081}
    ports:
      - "${RAG_API_PORT:-8081}:${RAG_API_PORT:-8081}"
    depends_on:
      postgres:
        condition: service_healthy

  crm-adapter:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: cs-agent-crm-adapter
    env_file:
      - .env
    environment:
      PORT: ${CRM_ADAPTER_PORT:-8082}
    command: uvicorn company_agent.crm_adapter.main:app --host 0.0.0.0 --port ${CRM_ADAPTER_PORT:-8082}
    ports:
      - "${CRM_ADAPTER_PORT:-8082}:${CRM_ADAPTER_PORT:-8082}"

  ingest-worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: cs-agent-ingest-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://agent:agent@postgres:5432/company_agent}
    command: python -m company_agent.ingest_worker.main sync
    volumes:
      - ./knowledge:/app/knowledge
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:

